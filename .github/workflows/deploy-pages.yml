name: Deploy Reports to GitHub Pages

# NOTE: scan-github-pages.yml uses a workflow_run trigger referencing this workflow
# by name ("Deploy Reports to GitHub Pages"). If this name is changed, update the
# workflow_run trigger in scan-github-pages.yml to match.

on:
  push:
    branches:
      - main
    paths:
      - 'reports/**'
      - 'index.html'
      - 'reports.html'
      - 'trends.html'
      - 'stats.json'
      - 'submit.js'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
